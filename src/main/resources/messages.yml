# ========================================== #
#           PrisonMinesX Messages            #
# ========================================== #

prefix: "&8[&9PrisonMinesX&8] &7"

mine:
  reset-broadcast: "&7The &3%mine% &7mine has been refreshed!"
  reset-warning: "&7The &3%mine% &7mine will refresh in &b%time%&7!"
  teleported: "&7Teleported to the &b%mine% &7mine."
  does-not-exist: "&cError: A mine with that name does not exist."

admin:
  created: "&7Successfully created the mine &b%mine%&7."
  deleted: "&7Successfully deleted the mine &b%mine%&7."
  redefined: "&7Updated the boundaries for the mine &b%mine%&7."
  undone: "&7Reverted the boundary changes for &b%mine%&7."
  tp-set: "&7Set the teleport location for &b%mine% &7to your current position."
  forced-reset: "&7Forced a manual reset for the &b%mine% &7mine."
  started: "&7The &b%mine% &7mine is now active. Timers have resumed."
  already-started: "&cThe &b%mine% &cmine is already active."
  started-all: "&7Successfully resumed &b%count% &7mines."
  stopped: "&7The &b%mine% &7mine has been paused. Timers are now frozen."
  already-stopped: "&cThe &b%mine% &cmine is already paused."
  stopped-all: "&7Successfully paused &b%count% &7mines."
  reloaded: "&7Successfully reloaded all configurations and messages."

# Commands and Error Messages
commands:
  player-only: "&cThis command can only be executed by a player."
  no-permission: "&cYou do not have permission to perform this action."
  no-mines: "&cThere are no active mines! Use &b/pmines create <name> &cto establish one."
  no-undo: "&cThere is no previous boundary state recorded for this mine."
  invalid-args: "&cInvalid arguments. Type &b/pmines help &cfor a list of commands."
  invalid-page: "&cInvalid page number. The maximum page is &b%max%&c."
  invalid-block: "&cError: Invalid block material."
  cannot-add-zero: "&cError: You cannot add a block to the mine with a 0% chance."
  mine-full: "&cThe mine is full! You must lower or remove other percentages first."
  exceeds-100: "&cCannot set to &b%chance%%&c. The total composition would exceed 100%."
  max-allowed: "&7The maximum available percentage you can allocate is &b%max%%&7."
  block-added: "&7Added &3%block% &7at &b%chance%% &7to &3%mine%&7."
  free-space: "&8(&7Remaining free space: &b%free%%&8)"
  block-removed: "&7Removed &3%block% &7from &3%mine%&7."
  cleared-all: "&7Cleared all block compositions from &3%mine%&7."
  name-too-long: "&cError: Mine names cannot exceed 16 characters."
  mine-exists: "&cError: A mine with that exact name already exists."
  we-selection: "&cError: You must make a complete WorldEdit selection first!"
  intersects: "&cCreation failed! This region intersects with the existing mine: &b%mine%"
  shift-right-delete: "&cSafety lock: You must Shift-Right-Click to delete a mine!"
  block-exists: "&cThe block &b%block% &cis already in this mine's composition!"
  tp-failed: "&cCannot teleport: The target world is no longer loaded."

  usage:
    create: "&cUsage: &b/pmines create <name>"
    delete: "&cUsage: &b/pmines delete <name>"
    reset: "&cUsage: &b/pmines reset <name>"
    setspawn: "&cUsage: &b/pmines setspawn <name>"
    tp: "&cUsage: &b/pmines tp <name>"
    info: "&cUsage: &b/pmines info <name>"
    flags: "&cUsage: &b/pmines flags <name>"
    start: "&cUsage: &b/pmines start <name|all>"
    stop: "&cUsage: &b/pmines stop <name|all>"
    set: "&cUsage: &b/pmines set <mine> <block> <percent>"
    unset: "&cUsage: &b/pmines unset <mine> <block|all>"
    redefine: "&cUsage: &b/pmines redefine <name>"
    undo: "&cUsage: &b/pmines undo <name>"

# Formatting for lists and outputs
formats:
  paused: "&cPaused"
  running: "&aRunning"
  enabled: "&aEnabled"
  disabled: "&cDisabled"
  global: "&aGlobal"
  nearby: "&cNearby Only"
  default: "&bDefault"

  list-header: "&8&m----------------------------------------"
  list-title: "&9&lActive Mines &8(&7Page &b%page%&8/&b%max%&8)"
  list-entry: " &8- &3%mine% &8(&7World: &b%world%&8)"
  list-next-page: "&7Type &b/pmines list %next% &7to view the next page."
  list-footer: "&8&m----------------------------------------"

  timers-header: "&8&m----------------------------------------"
  timers-title: "&9&lMine Timers &8(&7Page &b%page%&8/&b%max%&8)"
  timers-entry: " &8- &3%mine% &8- &7Resets in &b%time%"
  timers-footer: "&8&m----------------------------------------"

  hover-title: "&9&l%mine% Details:"
  hover-status: "&7Status: %status%"
  hover-reset: "&7Next Reset: &b%time%"
  hover-comp-title: "&9&lComposition:"
  comp-empty: "  &8- &cEmpty (No blocks configured)"
  comp-entry: "  &8- &3%block% &8(&b%chance%%&8)"
  hover-click: "&bClick to teleport to this mine."

  stats-header: "&8&m----------------------------------------"
  stats-title: "&9&lEfficiency Analytics"
  stats-entry: " &8- &3%mine%&8: &b%mined% &7mined, &b%resets% &7resets. &8(&7Avg: &b%avg% &7blks/reset&8)"
  stats-footer: "&8&m----------------------------------------"

info-format:
  - "&7Status: %status%"
  - "&7World: &b%world%"
  - "&7Blocks Remaining: &b%blocks_left%%"
  - "&7Flags:"
  - "  &8- &7Reset Delay: &b%delay%"
  - "  &8- &7Percent Reset: &b%percent%"
  - "  &8- &7Fill Mode: %fill%"
  - "  &8- &7Hologram: %hologram%"
  - "&7Composition:"
  - "%composition%"

prompts:
  cancelled: "&7Action aborted successfully."
  icon-set: "&7Display item updated successfully!"
  invalid-percent: "&cError: Please enter a valid number between 0 and 100. Try again or type &b'cancel'&c."
  invalid-delay: "&cError: Invalid format! Use a format like '10m'. Try again or type &b'cancel'&c."
  invalid-warning: "&cError: The warning time (%val%m) must be less than the total Reset Delay! Try again or type &b'cancel'&c."
  invalid-format: "&cError: Unrecognized input format! Please try again or type &b'cancel'&c."
  click-inv-icon: "&7Click any item in your &bbottom inventory &7to set it as the menu icon."
  click-inv-surface: "&7Click any block in your &bbottom inventory &7to set it as the surface layer."
  enter-percent: "&7Enter the spawn chance for &3%block% &8(&b0-100&8)&7. Type &b'cancel' &7to abort."
  enter-delay: "&7Enter the new Reset Interval &8(&be.g., 10m or 1h 30m&8)&7. Type &b'cancel' &7to abort."
  enter-warnings: "&7Enter the warning alerts in minutes, separated by commas &8(&be.g., 10,5,1&8)&7. Type &b'cancel' &7to abort."
  enter-percent-reset: "&7Enter the block threshold percentage to trigger a reset &8(&b0-100&8)&7. Type &b'cancel' &7to abort."
  block-set: "&7Configured &3%block% &7to spawn at &b%chance%% &7in &3%mine%&7."
  delay-set: "&7The reset interval has been updated to &b%time%&7."
  warnings-set: "&7Warning alerts configured successfully."
  surface-cleared: "&7The surface block requirement has been cleared."
  surface-set: "&7The surface block has been set to &3%block%&7."
  percent-set: "&7The reset threshold has been updated to &b%chance%%&7."

