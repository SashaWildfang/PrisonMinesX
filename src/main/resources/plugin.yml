name: PrisonMinesX
version: 1.0.0
main: com.sasha.prisonminesx.PrisonMinesX
api-version: 1.20
author: SashaTheSnep
description: Advanced prison mines system

# Essential Hooks
depend: [FastAsyncWorldEdit]
softdepend: [PlaceholderAPI]

commands:
  prisonmines:
    description: Core command for PrisonMinesX
    aliases: [pmines]

permissions:
  # Allows full access to all PrisonMinesX commands
  prisonminesx.admin:
    default: op
    children:
      prisonminesx.*: true

  # Wildcard granting all PrisonMinesX permissions
  prisonminesx.*:
    default: op
    children:
      prisonminesx.cmd.pmine: true
      prisonminesx.cmd.help: true
      prisonminesx.cmd.gui: true
      prisonminesx.cmd.list: true
      prisonminesx.cmd.timers: true
      prisonminesx.cmd.stats: true
      prisonminesx.cmd.reload: true
      prisonminesx.cmd.start: true
      prisonminesx.cmd.stop: true
      prisonminesx.cmd.flags: true
      prisonminesx.cmd.info: true
      prisonminesx.cmd.tp: true
      prisonminesx.cmd.set: true
      prisonminesx.cmd.unset: true
      prisonminesx.cmd.create: true
      prisonminesx.cmd.redefine: true
      prisonminesx.cmd.undo: true
      prisonminesx.cmd.delete: true
      prisonminesx.cmd.reset: true
      prisonminesx.cmd.setspawn: true

  # Allows access to the base /pmines command navigation
  prisonminesx.cmd.pmine:
    default: true