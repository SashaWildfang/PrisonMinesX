  comp-entry: "  &8- &a%block% &7(&e%chance%%&7)"
  hover-click: "&eClick to teleport to mine."

info-format:
  - "&7Status: %status%"
  - "&7World: &f%world%"
  - "&7Blocks Remaining: &f%blocks_left%%"
  - "&7Flags:"
  - "  &8- &7Reset Delay: &e%delay%"
  - "  &8- &7Percent Reset: &e%percent%"
  - "  &8- &7Fill Mode: %fill%"
  - "  &8- &7Hologram: %hologram%"
  - "&7Composition:"
  - "%composition%"

prompts:
  cancelled: "&cAction cancelled."
  icon-set: "&aDisplay item set!"
