  enter-surface: "&eType the Material name for the surface (or 'air' to clear), or type 'cancel'."
  enter-percent-reset: "&eType the percentage for auto-reset (0-100), or type 'cancel'."
  block-set: "&aSet &e%block% &ato &e%chance%% &ain &e%mine%&a."
