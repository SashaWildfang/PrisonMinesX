# Formatting for lists and outputs
formats:
  paused: "&cPaused"
  running: "&aRunning"
  enabled: "&aEnabled"
  disabled: "&cDisabled"
  global: "&aGlobal"
  nearby: "&cNearby Only"
  default: "Default"

  list-header: "&8&m----------------------------------------"
  list-title: "&a&lShowing %count% Mine(s) &7(Page %page%/%max%)"
  list-entry: " &8- &e%mine% &7(World: %world%)"
  list-next-page: "&eType /pmines list %next% to go to next page"
  list-footer: "&8&m----------------------------------------"

  timers-header: "&8&m----------------------------------------"
  timers-title: "&b&lMine Timers &7(Page %page%/%max%)"
  timers-entry: " &8- &e%mine% &7- Resets in &a%time%"
  timers-footer: "&8&m----------------------------------------"

  hover-title: "&b&l%mine% Info:"
  hover-status: "&7Status: %status%"
  hover-reset: "&7Next Reset: &e%time%"
  hover-comp-title: "&b&lComposition:"
