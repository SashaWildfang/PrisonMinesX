  invalid-format: "&cInvalid input format! Please try again or type 'cancel'."
  click-inv-icon: "&ePlease click an item in your inventory below to set it as the display item."
  enter-percent: "&eType the percentage to set for &a%block% &e(0-100) in chat, or type 'cancel'."
