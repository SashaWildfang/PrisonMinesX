# ========================================== #
#             PrisonMinesX Config            #
# ========================================== #

# Database Configuration
# Supported storage types: YAML, MYSQL, SQLITE
storage:
  type: "YAML"
  mysql:
    host: "localhost"
    port: 3306
    database: "prisonminesx"
    username: "root"
    password: ""
    use-ssl: false

# Global Default Settings for New Mines
settings:
  # The percentage of blocks remaining that will trigger an automatic reset.
  # (e.g., 20.0 means the mine resets when 80% of it has been mined).
  # Set to -1.0 to disable percentage-based resets by default.
  default-reset-percentage: 20.0

  # The time (in seconds) between automatic timer resets.
  # (e.g., 600 seconds = 10 minutes).
  default-reset-delay: 600

# ========================================== #
#              Visual Formats                #
# ========================================== #
# Color Theme: &9 (Blue), &3 (Dark Aqua), &b (Aqua), &7 (Gray), &8 (Dark Gray)

hologram-format:
  # Available Placeholders: %mine%, %paused%
  line-1: "&9&l%mine% Mine %paused%"

  # Available Placeholders: %mined%, %total%, %percent%
  line-2: "&b%mined%&8/&b%total% &7Blocks Mined &8(&b%percent%% &7Left&8)"

  # Available Placeholders: %time%
  line-3: "&7Resets in &b%time%"

  # Text appended to Line 1 when the mine's reset timer is paused.
  paused-placeholder: "&8(&cPAUSED&8)"

  # The temporary text that flashes on Line 3 when an admin forces a reset.
  forced-reset-line: "&3&lMine was forcibly reset!"

# The format for the Actionbar notification sent to players inside the mine.
# Available Placeholders: %mine%, %mined%, %total%, %percent%, %time%
actionbar-format: "&9&l%mine% &8| &b%mined%&8/&b%total% &7Mined &8| &7Resets in: &b%time%"